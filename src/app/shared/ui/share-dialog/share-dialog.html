@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-black/60 motion-safe:transition-opacity"
      aria-hidden="true"
      (click)="close()"
    ></div>

    <!-- Dialog -->
    <div
      #dialog
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      class="relative z-10 flex max-h-[85dvh] w-full max-w-md flex-col overflow-hidden rounded-xl border border-border bg-surface shadow-2xl"
      (keydown)="onKeydown($event)"
    >
      <!-- Header -->
      <header class="flex items-center justify-between gap-3 border-b border-border p-4">
        <h2
          [id]="titleId"
          class="font-heading min-w-0 truncate text-lg font-semibold text-foreground"
        >
          {{ titleText() }}
        </h2>
        <button
          #closeBtn
          type="button"
          class="flex size-11 shrink-0 items-center justify-center rounded-lg text-muted-foreground transition-colors hover:bg-surface-muted hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          aria-label="Cerrar"
          (click)="close()"
        >
          <ng-icon name="lucideX" class="text-xl" aria-hidden="true" />
        </button>
      </header>

      <!-- Body -->
      <form class="flex-1 space-y-4 overflow-y-auto p-4" (submit)="$event.preventDefault(); submit()">
        <div class="space-y-2">
          <label for="kubo-share-email" class="text-sm font-medium text-foreground">
            Compartir con
          </label>
          <div class="flex flex-col gap-2 sm:flex-row">
            <div class="relative flex-1">
              <ng-icon
                name="lucideMail"
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-base text-muted-foreground"
                aria-hidden="true"
              />
              <input
                id="kubo-share-email"
                type="email"
                required
                [value]="email()"
                (input)="onEmailInput($event)"
                placeholder="Correo electrónico"
                class="min-h-11 w-full rounded-lg border border-border bg-background pl-9 pr-3 text-sm text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
              />
            </div>
            <button
              type="submit"
              [disabled]="submitting() || !email().trim()"
              class="min-h-11 shrink-0 rounded-lg bg-brand px-4 text-sm font-semibold text-brand-fg transition-colors hover:bg-brand-hover disabled:cursor-not-allowed disabled:opacity-60"
            >
              {{ submitting() ? 'Enviando…' : 'Enviar' }}
            </button>
          </div>
          <p class="text-xs text-muted-foreground">La persona invitada podrá ver este archivo.</p>
        </div>

        @if (feedback(); as fb) {
          <p [class]="'flex items-center gap-2 rounded-lg px-3 py-2 text-sm ' + feedbackClass(fb.kind)">
            @if (fb.kind === 'success') {
              <ng-icon name="lucideCheck" aria-hidden="true" />
            }
            {{ fb.message }}
          </p>
        }
      </form>

      <!-- Footer -->
      <footer class="flex items-center justify-end border-t border-border p-4">
        <button
          type="button"
          class="min-h-11 rounded-lg border border-border bg-surface px-5 text-sm font-medium text-foreground transition-colors hover:bg-surface-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          (click)="close()"
        >
          Cerrar
        </button>
      </footer>
    </div>
  </div>
}
