@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-black/60 motion-safe:transition-opacity"
      aria-hidden="true"
      (click)="close()"
    ></div>

    <!-- Dialog -->
    <div
      role="dialog"
      aria-modal="true"
      class="relative z-10 w-full max-w-sm rounded-xl border border-border bg-surface shadow-2xl"
    >
      <header class="flex items-center justify-between border-b border-border px-5 py-4">
        <h2 class="font-heading text-lg font-semibold text-foreground">
          {{ mode() === 'share' ? 'Compartir ' : 'Revocar acceso a ' }} {{ itemName() ? '"' + itemName() + '"' : 'elemento' }}
        </h2>
        <button
          type="button"
          (click)="close()"
          class="flex size-8 items-center justify-center rounded-lg text-muted-foreground transition-colors hover:bg-surface-muted hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          aria-label="Cerrar"
        >
          <ng-icon name="lucideX" class="text-xl" aria-hidden="true" />
        </button>
      </header>

      <form class="flex flex-col gap-5 p-5" (submit)="submit($event)">
        <div class="flex flex-col gap-1.5">
          <label for="kubo-share-email" class="text-sm font-medium text-foreground">Correo electrónico del usuario</label>
          <div class="relative">
            <span
              class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-muted-foreground"
              aria-hidden="true"
            >
              <ng-icon name="lucideMail" class="text-base" />
            </span>
            <input
              #emailInput
              id="kubo-share-email"
              type="email"
              placeholder="correo@ejemplo.com"
              [value]="email()"
              (input)="onInput($event)"
              class="h-11 w-full rounded-lg border bg-background pl-10 pr-3 text-sm text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring border-border"
            />
          </div>
          @if (error()) {
            <p class="text-xs text-destructive">{{ error() }}</p>
          } @else if (email().length > 0 && !isEmailValid()) {
            <p class="text-xs text-destructive">Por favor ingresá un correo válido.</p>
          }
        </div>

        <div class="flex items-center justify-end gap-3 pt-2">
          <button
            type="button"
            (click)="close()"
            class="h-10 rounded-lg px-4 text-sm font-medium text-muted-foreground transition-colors hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          >
            Cancelar
          </button>
          <button
            type="submit"
            [disabled]="!isEmailValid() || isSubmitting()"
            class="h-10 rounded-lg px-5 text-sm font-semibold transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-60"
            [class.bg-brand]="mode() === 'share'"
            [class.text-brand-fg]="mode() === 'share'"
            [class.hover:bg-brand-hover]="mode() === 'share'"
            [class.bg-destructive]="mode() === 'revoke'"
            [class.text-destructive-foreground]="mode() === 'revoke'"
            [class.hover:bg-destructive/90]="mode() === 'revoke'"
          >
            @if (mode() === 'share') {
              {{ isSubmitting() ? 'Compartiendo...' : 'Compartir' }}
            } @else {
              {{ isSubmitting() ? 'Revocando...' : 'Revocar acceso' }}
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
