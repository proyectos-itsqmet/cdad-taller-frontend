@if (open()) {
  <div
    class="fixed inset-0 z-[60] flex items-center justify-center bg-background/80 backdrop-blur-sm transition-all"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-dialog-title"
  >
    <div
      class="w-full max-w-sm rounded-xl border border-border bg-surface p-6 shadow-xl animate-in zoom-in-95 fade-in"
    >
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div
            class="flex size-10 shrink-0 items-center justify-center rounded-full bg-destructive/10 text-destructive"
          >
            <ng-icon name="lucideAlertTriangle" class="text-xl" aria-hidden="true"></ng-icon>
          </div>
          <h2
            id="confirm-dialog-title"
            class="font-heading text-lg font-bold tracking-tight text-foreground"
          >
            {{ title() }}
          </h2>
        </div>
        <button
          type="button"
          class="rounded-md text-muted-foreground transition-colors hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
          (click)="close()"
        >
          <ng-icon name="lucideX" class="text-xl" aria-hidden="true"></ng-icon>
          <span class="sr-only">Cerrar</span>
        </button>
      </div>

      <p class="mb-6 text-sm text-muted-foreground leading-relaxed">{{ message() }}</p>

      <div class="flex justify-end gap-3">
        <button type="button" [disabled]="loading()" class="flex h-10 items-center justify-center rounded-lg px-4 text-sm font-medium text-foreground transition-colors hover:bg-surface-muted focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand disabled:opacity-50 disabled:cursor-not-allowed" (click)="close()">
          {{ cancelText() }}
        </button>
        <button type="button" [disabled]="loading()" class="flex h-10 items-center justify-center rounded-lg bg-destructive px-4 text-sm font-semibold text-destructive-foreground transition-colors hover:bg-destructive/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-destructive disabled:opacity-50 disabled:cursor-not-allowed text-white" (click)="submit()">
          @if (loading()) {
            <ng-icon name="lucideLoader2" class="mr-2 animate-spin text-lg" aria-hidden="true"></ng-icon>
          }
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
}
